  <!-- Waveform visualization hint at bottom -->
  <path d="M120 920 Q200 900 280 920 Q360 940 440 920 Q520 900 600 920 Q680 940 760 920 Q840 900 904 920" 
        stroke="#05D9E8" stroke-width="3" fill="none" opacity="0.6" filter="url(#glow)"/>
</svg>
