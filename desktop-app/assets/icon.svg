    <circle cx="445" cy="860" r="14" fill="#2a2a2a" stroke="#F4D03F" stroke-width="2"/>
    
    <!-- Channel 5 -->
    <rect x="534" y="320" width="90" height="580" rx="8" fill="url(#panelGrad)" stroke="#2a2d35" stroke-width="1"/>
    <text x="579" y="360" text-anchor="middle" font-family="monospace" font-size="28" fill="#05D9E8" filter="url(#glow)">05</text>
    <rect x="559" y="400" width="40" height="200" rx="4" fill="url(#sliderGrad)" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="564" y="530" width="30" height="16" rx="2" fill="#3a3a3a"/>
    <circle cx="579" cy="660" r="18" fill="url(#knobGrad)" stroke="#2a2a2a" stroke-width="1"/>
    <line x1="579" y1="644" x2="579" y2="652" stroke="#05D9E8" stroke-width="3" stroke-linecap="round"/>
    <circle cx="579" cy="720" r="18" fill="url(#knobGrad)" stroke="#2a2a2a" stroke-width="1"/>
    <line x1="579" y1="704" x2="579" y2="712" stroke="#FF2A6D" stroke-width="3" stroke-linecap="round"/>
    <circle cx="579" cy="820" r="14" fill="#2a2a2a" stroke="#FF3B30" stroke-width="2"/>
    <circle cx="579" cy="860" r="14" fill="#2a2a2a" stroke="#F4D03F" stroke-width="2"/>
    
    <!-- Channel 6 -->
    <rect x="634" y="320" width="90" height="580" rx="8" fill="url(#panelGrad)" stroke="#2a2d35" stroke-width="1"/>
    <text x="679" y="360" text-anchor="middle" font-family="monospace" font-size="28" fill="#05D9E8" filter="url(#glow)">06</text>
