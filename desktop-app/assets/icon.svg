    <line x1="679" y1="644" x2="679" y2="652" stroke="#05D9E8" stroke-width="3" stroke-linecap="round"/>
    <circle cx="679" cy="720" r="18" fill="url(#knobGrad)" stroke="#2a2a2a" stroke-width="1"/>
    <line x1="679" y1="704" x2="679" y2="712" stroke="#FF2A6D" stroke-width="3" stroke-linecap="round"/>
    <circle cx="679" cy="820" r="14" fill="#2a2a2a" stroke="#FF3B30" stroke-width="2"/>
    <circle cx="679" cy="860" r="14" fill="#2a2a2a" stroke="#F4D03F" stroke-width="2"/>
    
    <!-- Channel 7 -->
    <rect x="734" y="320" width="90" height="580" rx="8" fill="url(#panelGrad)" stroke="#2a2d35" stroke-width="1"/>
    <text x="779" y="360" text-anchor="middle" font-family="monospace" font-size="28" fill="#05D9E8" filter="url(#glow)">07</text>
    <rect x="759" y="400" width="40" height="200" rx="4" fill="url(#sliderGrad)" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="764" y="490" width="30" height="16" rx="2" fill="#3a3a3a"/>
    <circle cx="779" cy="660" r="18" fill="url(#knobGrad)" stroke="#2a2a2a" stroke-width="1"/>
    <line x1="779" y1="644" x2="779" y2="652" stroke="#05D9E8" stroke-width="3" stroke-linecap="round"/>
    <circle cx="779" cy="720" r="18" fill="url(#knobGrad)" stroke="#2a2a2a" stroke-width="1"/>
    <line x1="779" y1="704" x2="779" y2="712" stroke="#FF2A6D" stroke-width="3" stroke-linecap="round"/>
    <circle cx="779" cy="820" r="14" fill="#2a2a2a" stroke="#FF3B30" stroke-width="2"/>
    <circle cx="779" cy="860" r="14" fill="#F4D03F" filter="url(#glow)"/>
    
    <!-- Channel 8 -->
    <rect x="834" y="320" width="90" height="580" rx="8" fill="url(#panelGrad)" stroke="#2a2d35" stroke-width="1"/>
    <text x="879" y="360" text-anchor="middle" font-family="monospace" font-size="28" fill="#05D9E8" filter="url(#glow)">08</text>
    <rect x="859" y="400" width="40" height="200" rx="4" fill="url(#sliderGrad)" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="864" y="510" width="30" height="16" rx="2" fill="#3a3a3a"/>
    <circle cx="879" cy="660" r="18" fill="url(#knobGrad)" stroke="#2a2a2a" stroke-width="1"/>
    <line x1="879" y1="644" x2="879" y2="652" stroke="#05D9E8" stroke-width="3" stroke-linecap="round"/>
    <circle cx="879" cy="720" r="18" fill="url(#knobGrad)" stroke="#2a2a2a" stroke-width="1"/>
    <line x1="879" y1="704" x2="879" y2="712" stroke="#FF2A6D" stroke-width="3" stroke-linecap="round"/>
    <circle cx="879" cy="820" r="14" fill="#2a2a2a" stroke="#FF3B30" stroke-width="2"/>
    <circle cx="879" cy="860" r="14" fill="#2a2a2a" stroke="#F4D03F" stroke-width="2"/>
